name: Build Windows Game
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4  # <-- Updated to v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3' 
        target: 'desktop'
        arch: 'win64_mingw'

    - name: Configure CMake
      run: cmake -B build -G "MinGW Makefiles"

    - name: Build Game
      run: cmake --build build

    - name: Run windeployqt
      run: |
        mkdir release_folder
        copy build\QtMonopoly.exe release_folder\
        windeployqt release_folder\QtMonopoly.exe

    - name: Upload Windows Game
      uses: actions/upload-artifact@v4  # <-- Updated to v4
      with:
        name: QtMonopoly-Windows
        path: release_folder/